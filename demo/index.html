<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Triage Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f6f6f6;
            --panel-bg: #ffffff;
            --border-color: #e0e0e0;
            --vz-red: #ee0000;
            --text-main: #000000;
            --text-muted: #6f7171;
            --success: #007748;
            --warning: #ffbc3b;
            --danger: #d52b1e;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header / Navbar */
        .navbar {
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .navbar-brand img {
            height: 32px;
            width: auto;
        }

        .navbar-brand span {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-main);
            border-left: 1px solid var(--border-color);
            padding-left: 1rem;
        }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 1.5rem;
            align-items: start;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1.25rem;
            box-shadow: var(--shadow);
            max-height: 100%;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 1.25rem;
        }

        .header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.25rem;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input,
        textarea {
            width: 100%;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 2px;
            padding: 0.5rem 0.6rem;
            color: var(--text-main);
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #000;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            background: #000000;
            color: white;
            border: none;
            border-radius: 2px;
            padding: 0.75rem;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        button:hover {
            background: #333333;
        }

        /* Results Panel */
        #results-panel {
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        #results-panel.active {
            opacity: 1;
        }

        .result-card {
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        .result-card:last-child {
            border-bottom: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .target-name {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .prediction-value {
            font-size: 1.25rem;
            font-weight: 700;
        }

        /* Confidence Bar */
        .confidence-wrapper {
            margin-top: 0.5rem;
        }

        .confidence-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .bar-bg {
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: #000;
            width: 0%;
            transition: width 0.8s ease-out;
        }

        .pill {
            display: inline-block;
            padding: 0.4rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            width: 100%;
            text-align: left;
        }

        .pill.auto {
            background: #e6f4ea;
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .pill.review {
            background: #fef7e0;
            color: #b05a00;
            border-left: 4px solid var(--warning);
        }

        .loader {
            display: none;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading .btn-text { display: none; }
        .loading .loader { display: block; }

        @media (max-width: 1000px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="https://tse3.mm.bing.net/th/id/OIP.DeMH-6bd31N8XYjPFen1PgHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Verizon Logo">
            <span>Incident Triage AI</span>
        </div>
    </nav>

    <div class="container">
        <!-- Input Panel -->
        <div class="panel">
            <div class="header">
                <h2>Incident Details</h2>
                <p>Provide ticket information for ML analysis</p>
            </div>

            <div class="form-group">
                <label>Ticket Number</label>
                <input type="text" id="ticket_no" value="VZ_INC99214">
            </div>

            <div class="form-group">
                <label>Affected User</label>
                <input type="text" id="affected_user" value="Smith, John">
            </div>

            <div class="form-group">
                <label>Creation Date</label>
                <input type="text" id="created_at">
            </div>

            <div class="form-group">
                <label>Issue Description</label>
                <textarea
                    id="description">I am unable to connect to the VPN. It keeps throwing ERR_502 connection refused after the latest Windows update. Please help immediately as I cannot access my files.</textarea>
            </div>

            <button id="run-btn" onclick="runTriage()">
                <span class="btn-text">Run ML Triage</span>
                <div class="loader"></div>
            </button>
        </div>

        <!-- Output Panel -->
        <div class="panel" id="results-panel">
            <div class="header" style="margin-bottom: 1rem">
                <h2>Triage Insights</h2>
                <p id="inference-time">Ready for input</p>
            </div>

            <div id="gate-pill" class="pill" style="display:none;"></div>

            <div class="result-card">
                <div class="result-header">
                    <span class="target-name">Severity Prediction</span>
                    <span class="prediction-value" id="res-severity">-</span>
                </div>
                <div class="confidence-wrapper">
                    <div class="confidence-label">
                        <span>Model Confidence</span>
                        <span id="score-severity">0%</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" id="bar-severity"></div>
                    </div>
                </div>
            </div>

            <div class="result-card">
                <div class="result-header">
                    <span class="target-name">Priority Level</span>
                    <span class="prediction-value" id="res-priority">-</span>
                </div>
                <div class="confidence-wrapper">
                    <div class="confidence-label">
                        <span>Model Confidence</span>
                        <span id="score-priority">0%</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" id="bar-priority"></div>
                    </div>
                </div>
            </div>

            <div class="result-card">
                <div class="result-header">
                    <span class="target-name">Target Assignment</span>
                    <span class="prediction-value" id="res-queue">-</span>
                </div>
                <div class="confidence-wrapper">
                    <div class="confidence-label">
                        <span>Model Confidence</span>
                        <span id="score-queue">0%</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" id="bar-queue"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Preset date
        const now = new Date();
        const formatted = `${String(now.getDate()).padStart(2, '0')}-${String(now.getMonth() + 1).padStart(2, '0')}-${now.getFullYear()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        document.getElementById('created_at').value = formatted;

        async function runTriage() {
            const btn = document.getElementById('run-btn');
            const panel = document.getElementById('results-panel');

            btn.classList.add('loading');
            panel.classList.remove('active');

            const payload = {
                ticket_no: document.getElementById('ticket_no').value,
                created_at: document.getElementById('created_at').value,
                affected_user: document.getElementById('affected_user').value,
                description: document.getElementById('description').value
            };

            try {
                const response = await fetch('http://localhost:8000/api/v1/triage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("API Error");

                const data = await response.json();

                // Update UI
                document.getElementById('inference-time').innerText = `Processed in ${data.inference_time_ms}ms v${data.model_version}`;

                // Gate
                const pill = document.getElementById('gate-pill');
                pill.style.display = 'inline-block';
                const overallPct = Math.round(data.overall_confidence * 100);
                if (data.auto_assign) {
                    pill.className = 'pill auto';
                    pill.innerText = "✓ HIGH OVERALL CONFIDENCE (" + overallPct + "%): AUTO-ASSIGNED";
                } else {
                    pill.className = 'pill review';
                    pill.innerText = "⚠ REVIEW REQUIRED (" + overallPct + "% OVERALL): Check " + data.low_confidence_fields.join(", ");
                }

                // Severity
                updateCard('severity', data.severity);
                // Priority
                updateCard('priority', data.priority);
                // Queue
                updateCard('queue', data.assigned_to);

                panel.classList.add('active');
            } catch (e) {
                alert("Error connecting to API. Make sure uvicorn is running on port 8000.");
                console.error(e);
            } finally {
                btn.classList.remove('loading');
            }
        }

        function updateCard(id, dataObj) {
            document.getElementById(`res-${id}`).innerText = dataObj.label;

            const pct = Math.round(dataObj.confidence * 100);
            document.getElementById(`score-${id}`).innerText = `${pct}%`;

            const bar = document.getElementById(`bar-${id}`);
            // Reset to animate again
            bar.style.width = '0%';

            // Set color based on confidence
            if (pct >= 80) bar.style.background = 'var(--success)';
            else if (pct >= 50) bar.style.background = 'var(--warning)';
            else bar.style.background = 'var(--danger)';

            setTimeout(() => { bar.style.width = `${pct}%`; }, 100);
        }
    </script>
</body>

</html>
